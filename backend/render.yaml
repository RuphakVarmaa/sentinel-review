services:
  - type: web
    name: sentinel-review-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_SONNET
        value: us.anthropic.claude-sonnet-4-6
      - key: BEDROCK_MODEL_HAIKU
        value: us.anthropic.claude-haiku-4-5-20251001
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "https://frontend-nu-three-92.vercel.app,https://frontend.vercel.app,http://localhost:3000"
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
